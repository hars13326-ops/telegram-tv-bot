<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
</head>

<body>

<!-- 🔴 هنا مشغل الفيديو -->
<video id="video" controls></video>

<!-- 🔥 مكتبة HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- 🔥 كود التشغيل (هنا تضيفه) -->
<script>

let video = document.getElementById("video");
let hls;

let channels = [
"http://live.zerolagvpn.com/hls/ch1/index.m3u8",
"http://live.zerolagvpn.com/hls/ch2/index.m3u8",
"http://live.zerolagvpn.com/hls/a_ch3/index.m3u8",
"http://live.zerolagvpn.com/hls/ch4/index.m3u8",
"http://live.zerolagvpn.com/hls/ch5/index.m3u8",
"http://live.zerolagvpn.com/hls/ch6/index.m3u8",
"http://live.zerolagvpn.com/hls/ch7/index.m3u8",
"http://live.zerolagvpn.com/hls/ch8/index.m3u8",
"http://live.zerolagvpn.com/hls/ch9/index.m3u8",
"http://live.zerolagvpn.com/hls/ch10/index.m3u8",
"http://live.zerolagvpn.com/hls/ch11/index.m3u8"
];

function play(i){

if(hls) hls.destroy();

let url = channels[i];

if(video.canPlayType("application/vnd.apple.mpegurl")){
video.src = url;
video.play();
}
else if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
}

}

function getChannel(){
const p = new URLSearchParams(window.location.search);
return p.get("ch");
}

let ch = getChannel();

if(ch !== null){
play(parseInt(ch));
}

</script>

</body>
</html>
